# 새로 만든 스케줄 워크플로우가 GitHub 쪽 이슈로 트리거되지 않는 경우가 있어,
# 워크플로우 파일 자체를 수정/재커밋해 스케줄을 재동기화한다.
name: SRT 자동예매

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: srt-reserve
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  reserve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SRT bot
        id: run-bot
        env:
          SRT_ID: ${{ secrets.SRT_ID }}
          SRT_PASSWORD: ${{ secrets.SRT_PASSWORD }}
          DEP_STATION: ${{ vars.DEP_STATION }}
          ARR_STATION: ${{ vars.ARR_STATION }}
          TRAIN_DATE: ${{ vars.TRAIN_DATE }}
          TIME_START: ${{ vars.TIME_START }}
          TIME_END: ${{ vars.TIME_END }}
          ADULT_COUNT: ${{ vars.ADULT_COUNT }}
          CHILD_COUNT: ${{ vars.CHILD_COUNT }}
          SENIOR_COUNT: ${{ vars.SENIOR_COUNT }}
          SEAT_TYPE: ${{ vars.SEAT_TYPE }}
          CHECK_INTERVAL_MIN: "8"
          CHECK_INTERVAL_MAX: "15"
          MAX_RUN_SECONDS: "240"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Disable this workflow after a successful reservation
        if: steps.run-bot.outputs.reserved == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/srt-reserve.yml/disable"
